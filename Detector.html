<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Person Detector</title>
<!-- Menggunakan TensorFlow.js -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
<!-- Menggunakan model COCO-SSD -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;color:#e2e8f0}

.card{background:#161b22;border-radius:18px;padding:28px 28px 24px;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,.5)}

/* header */
.header{text-align:center;margin-bottom:14px}
.title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.02em}
.title span{color:#10b981} /* Warna Emerald Green */
.subtitle{font-size:11px;color:#4b5563;letter-spacing:.1em;margin-top:4px;text-transform:uppercase}
.badges{display:flex;justify-content:center;gap:8px;margin-top:12px}
.badge{font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid #2d3748;color:#6b7280;background:#1e2530;display:flex;align-items:center;gap:5px}
.srv-dot{width:7px;height:7px;border-radius:50%;background:#374151;transition:background .3s}
.srv-dot.on{background:#10b981;box-shadow:0 0 5px #10b981;animation:blink 1.6s infinite}
.srv-dot.ld{background:#f59e0b;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* stats */
.stats-row{display:flex;justify-content:center;gap:20px;margin:12px 0 16px;font-size:12px;color:#6b7280}
.stats-row b{color:#fff;font-weight:700;font-size:14px}

/* camera */
.cam-wrap{position:relative;width:100%;border-radius:12px;overflow:hidden;background:#0d1117;border:1px solid #2d3748;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
#video{width:100%;height:100%;object-fit:cover;display:none;transform:scaleX(-1)} /* Kembalikan mirror agar enak dipakai tes webcam */
#canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;transform:scaleX(-1)}
.cam-placeholder{display:flex;flex-direction:column;align-items:center;gap:10px;color:#374151;text-align:center;padding:20px}
.cam-placeholder svg{width:52px;height:52px}
.cam-placeholder p{font-size:13px;line-height:1.6}
.cam-footer{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(13,17,23,.9));padding:8px 12px;display:flex;align-items:center;gap:6px;font-size:11px;color:#6b7280}
.cdot{width:6px;height:6px;border-radius:50%;background:#374151;flex-shrink:0}
.cdot.live{background:#10b981;box-shadow:0 0 5px #10b981;animation:blink 1.6s infinite}
.cdot.ld{background:#f59e0b;animation:blink .7s infinite}

/* camera selector */
.cam-select-wrap{margin-bottom:12px;position:relative}
.cam-select-wrap select{
  width:100%;height:42px;border-radius:10px;border:1px solid #2d3748;
  background:#1a2030;color:#e2e8f0;font-family:'Inter',sans-serif;
  font-size:13px;padding:0 36px 0 38px;appearance:none;cursor:pointer;
  outline:none;transition:border-color .2s
}
.cam-select-wrap select:hover{border-color:#4b5563}
.cam-select-wrap select:focus{border-color:#10b981}
.cam-select-wrap select option{background:#1a2030;color:#e2e8f0}
.sel-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#6b7280;pointer-events:none}
.sel-icon svg{width:16px;height:16px;display:block}
.sel-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#6b7280;pointer-events:none;font-size:10px}
.cam-count{font-size:11px;color:#4b5563;margin-top:5px;text-align:right}

/* buttons */
.btn-row{display:flex;gap:10px;margin-bottom:18px}
.btn-main{flex:1;height:46px;border-radius:10px;background:#10b981;color:#000;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:filter .15s,transform .1s}
.btn-main:hover{filter:brightness(.88)}
.btn-main:active{transform:scale(.98)}
.btn-main:disabled{opacity:.5;cursor:not-allowed}
.btn-main svg{width:16px;height:16px}

/* log */
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.log-title{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.08em;color:#4b5563;text-transform:uppercase;font-weight:600}
.log-title-dot{width:6px;height:6px;border-radius:50%;background:#10b981}
.log-clear{font-size:12px;color:#10b981;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;font-weight:500;padding:2px 6px;border-radius:4px;transition:background .15s}
.log-clear:hover{background:rgba(16,185,129,.15)}
.log-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
.log-list::-webkit-scrollbar{width:4px}
.log-list::-webkit-scrollbar-thumb{background:#2d3748;border-radius:99px}
.log-item{display:flex;align-items:center;gap:10px;padding:9px 10px;background:#1a2030;border-radius:9px;border:1px solid #2d3748;animation:sIn .2s ease}
@keyframes sIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.log-thumb{width:36px;height:36px;border-radius:7px;background:#0d1117;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid #2d3748}
.log-info{flex:1;min-width:0}
.log-name{font-size:12px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-sub{font-size:11px;color:#4b5563;margin-top:1px}
.log-empty{text-align:center;color:#374151;font-size:13px;padding:20px 0}
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="title">Person <span>Detector</span></div>
    <div class="subtitle">Mendeteksi & Menghitung Manusia Secara Live</div>
    <div class="badges">
      <div class="badge"><div class="srv-dot" id="srv-dot"></div><span id="srv-txt">Server: Offline</span></div>
      <div class="badge">CCTV Mode</div>
    </div>
  </div>

  <div class="stats-row">
    <!-- Menambahkan highlight pada jumlah orang -->
    <span style="font-size: 14px">Jumlah Orang: <b id="s-total" style="color: #10b981;">0</b></span>
    <span>FPS: <b id="s-fps">—</b></span>
  </div>

  <div class="cam-select-wrap">
    <div class="sel-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
    </div>
    <select id="cam-select" onchange="onCamChange()">
      <option value="">— Pilih Kamera —</option>
    </select>
    <div class="sel-arrow">▼</div>
  </div>
  <div class="cam-count" id="cam-count">Memuat daftar kamera...</div>

  <div class="cam-wrap">
    <div class="cam-placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
      <p>Arahkan kamera ke orang-orang<br>lalu klik <strong style="color:#10b981">Mulai Deteksi</strong></p>
    </div>
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="cam-footer">
      <div class="cdot" id="cam-dot"></div>
      <span id="cam-txt">Menunggu kamera...</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-main" id="btn-main" onclick="handleMain()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
      <span id="btn-txt">Mulai Deteksi</span>
    </button>
  </div>

  <div class="log-header">
    <div class="log-title"><div class="log-title-dot"></div>Status Terkini</div>
    <button class="log-clear" onclick="clearLog()">Hapus Log</button>
  </div>
  <div class="log-list" id="log-list">
    <div class="log-empty" id="log-empty">Belum ada deteksi...</div>
  </div>

</div>
<script>
// ─── state ───────────────────────────────────────────────────
let detector = null, running = false, loading = false;
let fc = 0, fpsT = performance.now(), fps = 0;
let lastLogT = 0, lastPersonCount = -1; // Set -1 agar deteksi awal (0) tercatat
let logArr = [], rafId = null;
let cameras = [], activeCamId = null;

const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// ─── init: enumerate cameras ─────────────────────────────────
async function initCameras() {
  try {
    await navigator.mediaDevices.getUserMedia({ video: true, audio: false })
      .then(s => s.getTracks().forEach(t => t.stop()))
      .catch(e => console.warn("Izin awal belum diberikan/gagal:", e));

    const devices = await navigator.mediaDevices.enumerateDevices();
    cameras = devices.filter(d => d.kind === 'videoinput');

    const sel = document.getElementById('cam-select');
    
    if (cameras.length > 0) {
      sel.innerHTML = cameras.map((c, i) =>
          `<option value="${c.deviceId}">${c.label || 'Kamera ' + (i + 1)}</option>`
        ).join('');
      activeCamId = cameras[0].deviceId;
      sel.value = activeCamId;
      document.getElementById('cam-count').textContent = cameras.length + ' kamera ditemukan';
    } else {
      sel.innerHTML = '<option value="">Kamera Default (Auto)</option>';
      activeCamId = ''; 
      document.getElementById('cam-count').textContent = 'Menggunakan kamera default';
    }
  } catch (e) {
    document.getElementById('cam-count').textContent = 'Gagal memuat daftar kamera';
    console.error("Error enumerateDevices:", e);
  }
}

function onCamChange() {
  activeCamId = document.getElementById('cam-select').value;
  if (running) {
    stopCam();
    setTimeout(startCam, 300);
  }
}

// ─── ui helpers ──────────────────────────────────────────────
function srvState(s, t) {
  const d = document.getElementById('srv-dot');
  d.className = 'srv-dot' + (s ? ' ' + s : '');
  document.getElementById('srv-txt').textContent = t;
}
function camState(s, t) {
  document.getElementById('cam-dot').className = 'cdot' + (s ? ' ' + s : '');
  document.getElementById('cam-txt').textContent = t;
}

// ─── camera lifecycle ─────────────────────────────────────────
async function handleMain() {
  if (loading) return;
  running ? stopCam() : startCam();
}

async function startCam() {
  loading = true;

  const btn  = document.getElementById('btn-main');
  const btxt = document.getElementById('btn-txt');
  btn.disabled = true;
  btxt.textContent = 'Meminta izin...';
  srvState('ld', 'Server: Loading');
  camState('ld', 'Meminta akses kamera...');

  try {
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());

    let videoConstraints = { width: { ideal: 1280 }, height: { ideal: 720 } };
    if (activeCamId) videoConstraints.deviceId = { exact: activeCamId };

    const stream = await navigator.mediaDevices.getUserMedia({
      video: videoConstraints,
      audio: false
    });

    video.srcObject = stream;
    await new Promise((res, rej) => {
      video.onloadedmetadata = res;
      video.onerror = rej;
    });
    await video.play();

    document.getElementById('placeholder').style.display = 'none';
    video.style.display = 'block';
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;

    btxt.textContent = 'Menyiapkan TFJS...';
    camState('ld', 'Inisialisasi engine...');

    await tf.ready();
    
    btxt.textContent = 'Memuat Model AI...';
    camState('ld', 'Mengunduh model COCO-SSD...');

    if (!detector) {
      // Gunakan model lite agar frame rate tetap tinggi dan real-time
      detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
    }

    running = true;
    loading = false;
    btn.disabled = false;
    btxt.textContent = 'Stop Kamera';
    btn.style.background = '#dc2626'; // Merah saat nyala
    btn.style.color = '#fff';
    srvState('on', 'Server: Online');
    camState('live', 'Live — Melacak Manusia');
    addLog('Sistem Aktif', '👁️', 'Menunggu objek masuk...');
    
    rafId = requestAnimationFrame(detect);
    
  } catch (e) {
    loading = false;
    btn.disabled = false;
    btxt.textContent = 'Mulai Deteksi';
    srvState('', 'Server: Error');
    camState('', 'Error: ' + e.message);
    addLog('Gagal', '❌', 'Akses kamera ditolak');
    console.error("Error:", e);
  }
}

function stopCam() {
  running = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
  video.style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const btn = document.getElementById('btn-main');
  document.getElementById('btn-txt').textContent = 'Mulai Deteksi';
  btn.style.background = '#10b981';
  btn.style.color = '#000';
  btn.disabled = false;
  srvState('', 'Server: Offline');
  camState('', 'Kamera dihentikan');
  document.getElementById('s-fps').textContent = '—';
  document.getElementById('s-total').textContent = '0';
  lastPersonCount = -1;
  fc = 0;
}

// ─── detection loop ───────────────────────────────────────────
async function detect() {
  if (!running || !detector) return;

  if (video.readyState >= 2 && !video.paused) {
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
    }
    // Bersihkan canvas dari kotak lama setiap frame
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let predictions = [];
    try {
      predictions = await detector.detect(video);
    } catch (e) { 
      console.warn('Deteksi error', e); 
    }

    // ─── KUNCI LOGIKA: Saring hanya objek dengan class "person" ───
    const persons = predictions.filter(p => p.class === 'person' && p.score > 0.45);

    persons.forEach(p => {
      const [x, y, bw, bh] = p.bbox;
      const col = '#10b981'; // Warna Emerald
      
      // Kotak
      ctx.save();
      ctx.strokeStyle = col;
      ctx.lineWidth = 3;
      ctx.shadowColor = col;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.rect(x, y, bw, bh);
      ctx.stroke();
      
      // Corner keren
      ctx.shadowBlur = 0;
      ctx.lineWidth = 4;
      corners(ctx, x, y, bw, bh, 20);

      // Label
      const pct = (p.score * 100).toFixed(0) + '%';
      const labelText = `ORANG ${pct}`;
      ctx.font = 'bold 12px Inter,sans-serif';
      const lw = ctx.measureText(labelText).width + 16;
      const lh = 22;
      
      ctx.fillStyle = col;
      try { ctx.beginPath(); ctx.roundRect(x, y - lh - 4, lw, lh, 4); ctx.fill(); }
      catch (_) { ctx.fillRect(x, y - lh - 4, lw, lh); }
      
      ctx.fillStyle = '#000';
      ctx.fillText(labelText, x + 8, y - 10);
      ctx.restore();
    });

    // ─── UPDATE ANGKA SECARA REALTIME ───
    // Panjang array 'persons' mewakili jumlah orang yang terdeteksi di frame INI SAJA.
    // Jadi kalau orang keluar dari frame, 'persons.length' langsung turun dan otomatis update angka.
    const currentCount = persons.length;
    document.getElementById('s-total').textContent = currentCount;

    // Catat ke Log HANYA saat jumlah orang BERUBAH (Misal dari 5 ke 3)
    if (currentCount !== lastPersonCount) {
      const now = Date.now();
      // Debounce: Tunggu 1 detik sebelum mencatat log agar tidak spam saat AI berkedip
      if (now - lastLogT > 1000) {
        lastLogT = now;
        lastPersonCount = currentCount;
        
        if (currentCount === 0) {
          addLog(`Area Kosong`, '👀', `Tidak ada orang di frame`);
        } else {
          addLog(`${currentCount} Orang Terlihat`, '🧍', `Angka diperbarui secara real-time`);
        }
      }
    }

    // Kalkulasi FPS
    fc++;
    const t = performance.now();
    if (t - fpsT >= 1000) {
      fps = Math.round(fc * 1000 / (t - fpsT));
      fc = 0; fpsT = t;
      document.getElementById('s-fps').textContent = fps;
    }
  }

  // Ulangi loop secara terus-menerus
  rafId = requestAnimationFrame(detect);
}

// ─── helpers ─────────────────────────────────────────────────
function addLog(name, emoji, sub) {
  const list = document.getElementById('log-list');
  const emp  = document.getElementById('log-empty');
  if (emp) emp.remove();
  const el = document.createElement('div');
  el.className = 'log-item';
  el.innerHTML = `
    <div class="log-thumb" style="border-color:#10b981; color:#fff">${emoji}</div>
    <div class="log-info">
      <div class="log-name">${esc(name)}</div>
      <div class="log-sub">${esc(sub)}</div>
    </div>`;
  list.insertBefore(el, list.firstChild);
  logArr.push(el);
  if (logArr.length > 20) logArr.shift().remove();
}

function clearLog() {
  document.getElementById('log-list').innerHTML = '<div class="log-empty" id="log-empty">Belum ada deteksi...</div>';
  logArr = [];
  lastPersonCount = -1; // Reset tracker log
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function corners(c, x, y, w, h, l) {
  c.beginPath();
  c.moveTo(x,y+l); c.lineTo(x,y); c.lineTo(x+l,y);
  c.moveTo(x+w-l,y); c.lineTo(x+w,y); c.lineTo(x+w,y+l);
  c.moveTo(x+w,y+h-l); c.lineTo(x+w,y+h); c.lineTo(x+w-l,y+h);
  c.moveTo(x+l,y+h); c.lineTo(x,y+h); c.lineTo(x,y+h-l);
  c.stroke();
}

// Mulai persiapan
initCameras();
</script>
</body>
</html>
