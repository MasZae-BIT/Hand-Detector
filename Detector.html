<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Detector Fix</title>
<!-- MENGGUNAKAN FULL TENSORFLOW SCRIPT AGAR TIDAK ADA MODUL YANG HILANG -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;color:#e2e8f0}

.card{background:#161b22;border-radius:18px;padding:28px 28px 24px;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,.5)}

/* header */
.header{text-align:center;margin-bottom:14px}
.title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.02em}
.title span{color:#22c55e}
.subtitle{font-size:11px;color:#4b5563;letter-spacing:.1em;margin-top:4px;text-transform:uppercase}
.badges{display:flex;justify-content:center;gap:8px;margin-top:12px}
.badge{font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid #2d3748;color:#6b7280;background:#1e2530;display:flex;align-items:center;gap:5px}
.srv-dot{width:7px;height:7px;border-radius:50%;background:#374151;transition:background .3s}
.srv-dot.on{background:#22c55e;box-shadow:0 0 5px #22c55e;animation:blink 1.6s infinite}
.srv-dot.ld{background:#f59e0b;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* stats */
.stats-row{display:flex;justify-content:center;gap:20px;margin:12px 0 16px;font-size:12px;color:#6b7280}
.stats-row b{color:#fff;font-weight:700}

/* camera */
.cam-wrap{position:relative;width:100%;border-radius:12px;overflow:hidden;background:#0d1117;border:1px solid #2d3748;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
#video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:none}
#canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;transform:scaleX(-1)}
.cam-placeholder{display:flex;flex-direction:column;align-items:center;gap:10px;color:#374151;text-align:center;padding:20px}
.cam-placeholder svg{width:52px;height:52px}
.cam-placeholder p{font-size:13px;line-height:1.6}
.cam-footer{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(13,17,23,.9));padding:8px 12px;display:flex;align-items:center;gap:6px;font-size:11px;color:#6b7280}
.cdot{width:6px;height:6px;border-radius:50%;background:#374151;flex-shrink:0}
.cdot.live{background:#22c55e;box-shadow:0 0 5px #22c55e;animation:blink 1.6s infinite}
.cdot.ld{background:#f59e0b;animation:blink .7s infinite}

/* camera selector */
.cam-select-wrap{margin-bottom:12px;position:relative}
.cam-select-wrap select{
  width:100%;height:42px;border-radius:10px;border:1px solid #2d3748;
  background:#1a2030;color:#e2e8f0;font-family:'Inter',sans-serif;
  font-size:13px;padding:0 36px 0 38px;appearance:none;cursor:pointer;
  outline:none;transition:border-color .2s
}
.cam-select-wrap select:hover{border-color:#4b5563}
.cam-select-wrap select:focus{border-color:#22c55e}
.cam-select-wrap select option{background:#1a2030;color:#e2e8f0}
.sel-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#6b7280;pointer-events:none}
.sel-icon svg{width:16px;height:16px;display:block}
.sel-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#6b7280;pointer-events:none;font-size:10px}
.cam-count{font-size:11px;color:#4b5563;margin-top:5px;text-align:right}

/* buttons */
.btn-row{display:flex;gap:10px;margin-bottom:18px}
.btn-icon{width:46px;height:46px;border-radius:10px;border:1px solid #2d3748;background:#1e2530;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:border-color .2s,background .2s,color .2s;color:#6b7280}
.btn-icon:hover{border-color:#4b5563;background:#252d3a;color:#9ca3af}
.btn-icon.active{border-color:#22c55e;color:#22c55e}
.btn-icon svg{width:18px;height:18px}
.btn-main{flex:1;height:46px;border-radius:10px;background:#22c55e;color:#000;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:filter .15s,transform .1s}
.btn-main:hover{filter:brightness(.88)}
.btn-main:active{transform:scale(.98)}
.btn-main:disabled{opacity:.5;cursor:not-allowed}
.btn-main svg{width:16px;height:16px}

/* log */
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.log-title{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.08em;color:#4b5563;text-transform:uppercase;font-weight:600}
.log-title-dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
.log-clear{font-size:12px;color:#22c55e;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;font-weight:500;padding:2px 6px;border-radius:4px;transition:background .15s}
.log-clear:hover{background:rgba(34,197,94,.08)}
.log-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
.log-list::-webkit-scrollbar{width:4px}
.log-list::-webkit-scrollbar-thumb{background:#2d3748;border-radius:99px}
.log-item{display:flex;align-items:center;gap:10px;padding:9px 10px;background:#1a2030;border-radius:9px;border:1px solid #2d3748;animation:sIn .2s ease}
@keyframes sIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.log-thumb{width:36px;height:36px;border-radius:7px;background:#0d1117;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid #2d3748}
.log-info{flex:1;min-width:0}
.log-name{font-size:12px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-sub{font-size:11px;color:#4b5563;margin-top:1px}
.log-ext{color:#4b5563;flex-shrink:0}
.log-ext svg{width:14px;height:14px;display:block}
.log-empty{text-align:center;color:#374151;font-size:13px;padding:20px 0}
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="title">Hand <span>Detector</span></div>
    <div class="subtitle">Real-time · Multi-hand · AI Powered</div>
    <div class="badges">
      <div class="badge"><div class="srv-dot" id="srv-dot"></div><span id="srv-txt">Server: Offline</span></div>
      <div class="badge">Versi: 2.2 (Fix)</div>
    </div>
  </div>

  <div class="stats-row">
    <span>Terdeteksi: <b id="s-total">0</b></span>
    <span>Session: <b id="s-sess">0</b></span>
    <span>FPS: <b id="s-fps">—</b></span>
  </div>

  <!-- Camera selector -->
  <div class="cam-select-wrap">
    <div class="sel-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
    </div>
    <select id="cam-select" onchange="onCamChange()">
      <option value="">— Pilih Kamera —</option>
    </select>
    <div class="sel-arrow">▼</div>
  </div>
  <div class="cam-count" id="cam-count">Memuat daftar kamera...</div>

  <div class="cam-wrap">
    <div class="cam-placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/>
        <path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/>
        <path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/>
        <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
      </svg>
      <p>Pilih kamera di atas lalu klik<br><strong style="color:#22c55e">Aktifkan Kamera</strong></p>
    </div>
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="cam-footer">
      <div class="cdot" id="cam-dot"></div>
      <span id="cam-txt">Menunggu kamera...</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-icon active" id="btn-kp" title="Keypoints ON/OFF" onclick="toggleKP()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><circle cx="5" cy="5" r="2"/><circle cx="19" cy="5" r="2"/>
        <circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/>
      </svg>
    </button>
    <button class="btn-icon active" id="btn-sk" title="Skeleton ON/OFF" onclick="toggleSK()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 6h18M3 12h18M3 18h18"/>
      </svg>
    </button>
    <button class="btn-main" id="btn-main" onclick="handleMain()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
      <span id="btn-txt">Aktifkan Kamera</span>
    </button>
  </div>

  <div class="log-header">
    <div class="log-title"><div class="log-title-dot"></div>Log Aktivitas</div>
    <button class="log-clear" onclick="clearLog()">Hapus Log</button>
  </div>
  <div class="log-list" id="log-list">
    <div class="log-empty" id="log-empty">Belum ada deteksi...</div>
  </div>

</div>
<script>
// ─── constants ───────────────────────────────────────────────
const EMOJIS = ['🤚','✋','🖐️','👋','🤙','☝️','✌️','🤞','👌','🤘'];
const CONN = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17]
];

// ─── state ───────────────────────────────────────────────────
let detector = null, running = false, loading = false;
let showKP = true, showSK = true;
let fc = 0, fpsT = performance.now(), fps = 0;
let lastLogT = 0, lastN = 0, sessCount = 0, maxDet = 0;
let logArr = [], rafId = null;
let cameras = [], activeCamId = null;

const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// ─── init: enumerate cameras ─────────────────────────────────
async function initCameras() {
  try {
    await navigator.mediaDevices.getUserMedia({ video: true, audio: false })
      .then(s => s.getTracks().forEach(t => t.stop()))
      .catch(e => console.warn("Izin awal belum diberikan/gagal:", e));

    const devices = await navigator.mediaDevices.enumerateDevices();
    cameras = devices.filter(d => d.kind === 'videoinput');

    const sel = document.getElementById('cam-select');
    
    if (cameras.length > 0) {
      sel.innerHTML = cameras.map((c, i) =>
          `<option value="${c.deviceId}">${c.label || 'Kamera ' + (i + 1)}</option>`
        ).join('');
      activeCamId = cameras[0].deviceId;
      document.getElementById('cam-count').textContent = cameras.length + ' kamera ditemukan';
    } else {
      sel.innerHTML = '<option value="">Kamera Default (Auto)</option>';
      activeCamId = ''; 
      document.getElementById('cam-count').textContent = 'Menggunakan kamera default';
    }
  } catch (e) {
    document.getElementById('cam-count').textContent = 'Gagal memuat daftar kamera';
    console.error("Error enumerateDevices:", e);
  }
}

function onCamChange() {
  activeCamId = document.getElementById('cam-select').value;
  if (running) {
    stopCam();
    setTimeout(startCam, 300);
  }
}

// ─── ui helpers ──────────────────────────────────────────────
function srvState(s, t) {
  const d = document.getElementById('srv-dot');
  d.className = 'srv-dot' + (s ? ' ' + s : '');
  document.getElementById('srv-txt').textContent = t;
}
function camState(s, t) {
  document.getElementById('cam-dot').className = 'cdot' + (s ? ' ' + s : '');
  document.getElementById('cam-txt').textContent = t;
}
function toggleKP() {
  showKP = !showKP;
  document.getElementById('btn-kp').classList.toggle('active', showKP);
}
function toggleSK() {
  showSK = !showSK;
  document.getElementById('btn-sk').classList.toggle('active', showSK);
}

// ─── camera lifecycle ─────────────────────────────────────────
async function handleMain() {
  if (loading) return;
  running ? stopCam() : startCam();
}

async function startCam() {
  loading = true;

  const btn  = document.getElementById('btn-main');
  const btxt = document.getElementById('btn-txt');
  btn.disabled = true;
  btxt.textContent = 'Meminta izin...';
  srvState('ld', 'Server: Loading');
  camState('ld', 'Meminta akses kamera...');

  try {
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());

    let videoConstraints = { width: { ideal: 1280 }, height: { ideal: 720 } };
    
    if (activeCamId) {
      videoConstraints.deviceId = { exact: activeCamId };
    } else {
      videoConstraints.facingMode = 'user'; 
    }

    const stream = await navigator.mediaDevices.getUserMedia({
      video: videoConstraints,
      audio: false
    });

    video.srcObject = stream;
    await new Promise((res, rej) => {
      video.onloadedmetadata = res;
      video.onerror = rej;
    });
    await video.play();

    document.getElementById('placeholder').style.display = 'none';
    video.style.display = 'block';
    canvas.width  = video.videoWidth  || 1280;
    canvas.height = video.videoHeight || 720;

    btxt.textContent = 'Menyiapkan TFJS...';
    camState('ld', 'Inisialisasi WebGL...');

    // MEMASTIKAN TENSORFLOW SIAP SEBELUM MODEL DI-LOAD
    await tf.ready();
    
    btxt.textContent = 'Memuat Model AI...';
    camState('ld', 'Mengunduh model Lite (harap tunggu)...');

    if (!detector) {
      detector = await handPoseDetection.createDetector(
        handPoseDetection.SupportedModels.MediaPipeHands,
        { 
          runtime: 'tfjs', 
          modelType: 'lite', // Ganti ke lite agar jauh lebih cepat dan tidak stuck
          maxHands: 2 // Deteksi maksimal 2 tangan sekaligus agar lebih ringan
        }
      );
    }

    running = true;
    loading = false;
    btn.disabled = false;
    btxt.textContent = 'Stop Kamera';
    btn.style.background = '#dc2626';
    btn.style.color = '#fff';
    srvState('on', 'Server: Online');
    camState('live', 'Live — Deteksi Aktif');
    addLog('Model siap', '🤖', 'MediaPipe Lite · ' + tf.getBackend().toUpperCase());
    
    // Mulai loop deteksi
    rafId = requestAnimationFrame(detect);
    
  } catch (e) {
    loading = false;
    btn.disabled = false;
    btxt.textContent = 'Aktifkan Kamera';
    srvState('', 'Server: Error');
    camState('', 'Error: ' + e.message);
    addLog('Gagal', '❌', 'Error inisialisasi AI');
    console.error("Camera/Model Error:", e);
  }
}

function stopCam() {
  running = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
  video.style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const btn = document.getElementById('btn-main');
  document.getElementById('btn-txt').textContent = 'Aktifkan Kamera';
  btn.style.background = '#22c55e';
  btn.style.color = '#000';
  btn.disabled = false;
  srvState('', 'Server: Offline');
  camState('', 'Kamera dihentikan');
  document.getElementById('s-fps').textContent = '—';
  lastN = 0;
  fc = 0;
}

// ─── detection loop ───────────────────────────────────────────
async function detect() {
  if (!running || !detector) return;

  if (video.readyState >= 2 && !video.paused) {
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let hands = [];
    try {
      hands = await detector.estimateHands(video, { flipHorizontal: false });
    } catch (e) { 
      console.warn('Deteksi tertunda', e); 
    }

    hands.forEach(hand => {
      const kps = hand.keypoints;
      if (!kps || kps.length === 0) return;

      let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
      kps.forEach(k => {
        if (k.x < x1) x1 = k.x; if (k.y < y1) y1 = k.y;
        if (k.x > x2) x2 = k.x; if (k.y > y2) y2 = k.y;
      });
      const pad = 22;
      x1 -= pad; y1 -= pad; x2 += pad; y2 += pad;
      const bw = x2 - x1, bh = y2 - y1;
      const isL = hand.handedness === 'Left';
      const col = isL ? '#22c55e' : '#3b82f6';

      // bounding box
      ctx.save();
      ctx.strokeStyle = col;
      ctx.lineWidth = 2;
      ctx.shadowColor = col;
      ctx.shadowBlur = 12;
      rrect(ctx, x1, y1, bw, bh, 10);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.lineWidth = 3;
      corners(ctx, x1, y1, bw, bh, 16);

      // label badge
      const pct = hand.score != null ? (hand.score * 100).toFixed(0) + '%' : '';
      const lbl = (isL ? '● KIRI' : '● KANAN') + (pct ? '  ' + pct : '');
      ctx.font = 'bold 11px Inter,sans-serif';
      const lw = ctx.measureText(lbl).width + 14;
      const lh = 20;
      const lx = x1, ly = y1 - lh - 2;
      ctx.fillStyle = col;
      ctx.shadowColor = col; ctx.shadowBlur = 8;
      try { ctx.beginPath(); ctx.roundRect(lx, ly, lw, lh, 5); ctx.fill(); }
      catch (_) { ctx.fillRect(lx, ly, lw, lh); }
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#000';
      ctx.fillText(lbl, lx + 7, ly + lh - 6);
      ctx.restore();

      // skeleton
      if (showSK) {
        ctx.save();
        ctx.strokeStyle = isL ? 'rgba(34,197,94,0.45)' : 'rgba(59,130,246,0.45)';
        ctx.lineWidth = 1.8;
        ctx.lineJoin = 'round';
        CONN.forEach(([a, b]) => {
          if (!kps[a] || !kps[b]) return;
          ctx.beginPath();
          ctx.moveTo(kps[a].x, kps[a].y);
          ctx.lineTo(kps[b].x, kps[b].y);
          ctx.stroke();
        });
        ctx.restore();
      }

      // keypoints
      if (showKP) {
        kps.forEach(kp => {
          ctx.beginPath();
          ctx.arc(kp.x, kp.y, 3.5, 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
          ctx.strokeStyle = col;
          ctx.lineWidth = 1.5;
          ctx.stroke();
        });
      }
    });

    // stats
    const n = hands.length;
    if (n > maxDet) {
      maxDet = n;
      document.getElementById('s-total').textContent = maxDet;
    }
    if (n > 0 && n !== lastN) {
      const now = Date.now();
      if (now - lastLogT > 1500) {
        lastLogT = now;
        sessCount++;
        document.getElementById('s-sess').textContent = sessCount;
        const em = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
        const nm = hands.map((h, i) => `Tangan ${i+1} (${h.handedness === 'Left' ? 'Kiri' : 'Kanan'})`).join(', ');
        addLog(nm, em, n + ' tangan · ' + fps + ' fps');
      }
    }
    lastN = n;

    // hitung fps
    fc++;
    const t = performance.now();
    if (t - fpsT >= 1000) {
      fps = Math.round(fc * 1000 / (t - fpsT));
      fc = 0; fpsT = t;
      document.getElementById('s-fps').textContent = fps;
    }
  }

  // Lanjutkan loop
  rafId = requestAnimationFrame(detect);
}

// ─── log helpers ──────────────────────────────────────────────
function addLog(name, emoji, sub) {
  const list = document.getElementById('log-list');
  const emp  = document.getElementById('log-empty');
  if (emp) emp.remove();
  const el = document.createElement('div');
  el.className = 'log-item';
  el.innerHTML = `
    <div class="log-thumb">${emoji}</div>
    <div class="log-info">
      <div class="log-name">${esc(name)}</div>
      <div class="log-sub">${esc(sub)}</div>
    </div>
    <div class="log-ext">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </div>`;
  list.insertBefore(el, list.firstChild);
  logArr.push(el);
  if (logArr.length > 15) logArr.shift().remove();
}

function clearLog() {
  document.getElementById('log-list').innerHTML =
    '<div class="log-empty" id="log-empty">Belum ada deteksi...</div>';
  logArr = [];
  sessCount = 0;
  document.getElementById('s-sess').textContent = '0';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── canvas draw utils ────────────────────────────────────────
function rrect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}
function corners(c, x, y, w, h, l) {
  c.beginPath();
  c.moveTo(x,y+l); c.lineTo(x,y); c.lineTo(x+l,y);
  c.moveTo(x+w-l,y); c.lineTo(x+w,y); c.lineTo(x+w,y+l);
  c.moveTo(x+w,y+h-l); c.lineTo(x+w,y+h); c.lineTo(x+w-l,y+h);
  c.moveTo(x+l,y+h); c.lineTo(x,y+h); c.lineTo(x,y+h-l);
  c.stroke();
}
